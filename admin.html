<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body class="bg-black text-white p-5">
    <h1 class="text-2xl font-bold text-red-500 border-b border-gray-800 mb-5">LIVE NOTIFICATIONS</h1>
    <div id="logs" class="space-y-3"></div>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAjCwvhvWy71cK09aDNtkL99vrv1YdFW-c",
            databaseURL: "https://notifaction-reading-default-rtdb.firebaseio.com",
            projectId: "notifaction-reading"
        };
        firebase.initializeApp(firebaseConfig);
        firebase.database().ref('logs').on('child_added', (snap) => {
            const d = snap.val();
            const html = `<div class="bg-gray-900 p-4 rounded border-l-4 border-red-600">
                <p class="text-blue-400 text-xs font-bold">${d.appName}</p>
                <p class="text-white font-bold">${d.title}</p>
                <p class="text-gray-400 text-sm">${d.message}</p>
                <p class="text-gray-600 text-[10px] mt-1">${d.time}</p>
            </div>`;
            document.getElementById('logs').insertAdjacentHTML('afterbegin', html);
        });
    </script>
</body>
</html>
