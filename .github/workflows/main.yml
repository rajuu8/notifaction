name: Build Notification APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Full Project Structure
        run: |
          # 1. Folders banana
          mkdir -p app/src/main/java/com/notif/read
          mkdir -p app/src/main/res/values
          mkdir -p gradle/wrapper

          # 2. Files ko sahi jagah copy karna
          cp MyNotificationListener.java app/src/main/java/com/notif/read/
          cp AndroidManifest.xml app/src/main/

          # 3. Settings file generate karna
          echo "include ':app'" > settings.gradle

          # 4. Top-level build.gradle (Root)
          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:7.4.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          # 5. App-level build.gradle
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.notif.read'
              compileSdk 33
              defaultConfig {
                  applicationId "com.notif.read"
                  minSdk 21
                  targetSdk 33
                  versionCode 1
                  versionName "1.0"
              }
          }
          EOF

          # 6. Basic resources (Taaki build fail na ho)
          echo '<resources><string name="app_name">System Sync</string></resources>' > app/src/main/res/values/strings.xml

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.0

      - name: Build APK with Force
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: NotificationApp
          path: app/build/outputs/apk/debug/*.apk
