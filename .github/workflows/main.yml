name: Build Notification APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Project and Build
        run: |
          mkdir -p app/src/main/java/com/notif/read
          mkdir -p app/src/main/res/values
          cp MyNotificationListener.java app/src/main/java/com/notif/read/
          cp AndroidManifest.xml app/src/main/
          echo "include ':app'" > settings.gradle
          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:7.4.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.notif.read'
              compileSdk 33
              defaultConfig {
                  applicationId "com.notif.read"
                  minSdk 21
                  targetSdk 33
                  versionCode 1
                  versionName "1.0"
              }
          }
          EOF
          echo '<resources><string name="app_name">Notif Reader</string></resources>' > app/src/main/res/values/strings.xml

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.0

      - name: Build APK
        run: gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MyNotificationApp
          path: app/build/outputs/apk/debug/*.apk
