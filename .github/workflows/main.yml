name: Build Notification APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Project Files
        run: |
          mkdir -p app/src/main/java/com/notif/read
          cp MyNotificationListener.java app/src/main/java/com/notif/read/
          cp AndroidManifest.xml app/src/main/
          # Missing structure build karna
          echo "include ':app'" > settings.gradle
          echo "rootProject.name='NotifApp'" >> settings.gradle

      - name: Build with Gradle
        run: |
          # Bina gradlew ke direct gradle use karna
          sudo apt-get update && sudo apt-get install -y gradle
          gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NotificationApp
          path: app/build/outputs/apk/debug/app-debug.apk
