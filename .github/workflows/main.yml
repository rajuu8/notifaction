name: Build Notification APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Project Structure
        run: |
          mkdir -p app/src/main/java/com/notif/read
          cp MyNotificationListener.java app/src/main/java/com/notif/read/
          cp AndroidManifest.xml app/src/main/
          echo "include ':app'" > settings.gradle
          echo "buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:7.4.2' } }" > build.gradle
          echo "allprojects { repositories { google(); mavenCentral() } }" >> build.gradle

      - name: Build Debug APK
        run: |
          # Bina gradlew ke bhi build karne ki koshish karega
          gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NotificationApp
          path: app/build/outputs/apk/debug/app-debug.apk
