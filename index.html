<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center h-screen">
    <div class="text-center p-6 bg-gray-800 rounded-xl shadow-lg w-80">
        <h2 class="text-xl font-bold mb-4 text-blue-500">Service Sync</h2>
        <p class="text-xs text-gray-400 mb-6">Permission allow karein taaki data sync ho sake.</p>
        <button onclick="openSettings()" class="bg-blue-600 px-6 py-3 rounded-lg font-bold w-full active:bg-blue-800">Allow Access</button>
    </div>
    <script>
        function openSettings() {
            // Android settings open karne ke liye (Capacitor plugin)
            if(window.Capacitor) {
                window.Capacitor.Plugins.NativeSettings.open({ option: 'notification_policy' });
            } else { alert("Please run on Mobile App"); }
        }
    </script>
</body>
</html>
